name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.2.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(cat VERSION)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build distributions
        run: python3 scripts/build_distributions.py --version "${{ steps.version.outputs.version }}"

      - name: Extract release notes
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          version = "${{ steps.version.outputs.version }}"
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## {re.escape(version)}[^\n]*\n(?P<body>.*?)(?=^## |\Z)",
              changelog,
              flags=re.MULTILINE | re.DOTALL,
          )
          notes = match.group("body").strip() if match else f"Release {version}"
          Path("RELEASE_NOTES.md").write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
          gh release upload "$TAG" \
            "docs/downloads/mac-photos-duplicate-finder-${VERSION}.zip" \
            "docs/downloads/mac-photos-duplicate-finder-${VERSION}.tar.gz" \
            docs/downloads/SHA256SUMS.txt \
            docs/downloads/manifest.json \
            docs/downloads/releases.json \
            --clobber
